<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Porque eres tú ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:'Poppins',sans-serif;
    color:white;
}

/* ========================================= */
/* UNIVERSO */
/* ========================================= */

#universe{
    position:fixed;
    width:100%;
    height:100vh;
    overflow:hidden;
    background:
    radial-gradient(circle at center,
    #160021 0%,
    #090014 40%,
    #000000 100%);
}

/* ========================================= */
/* ESTRELLAS */
/* ========================================= */

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:twinkle linear infinite;
}

@keyframes twinkle{
    0%{
        opacity:0.2;
        transform:scale(0.8);
    }
    50%{
        opacity:1;
        transform:scale(1.2);
    }
    100%{
        opacity:0.2;
        transform:scale(0.8);
    }
}

/* ========================================= */
/* ESTRELLAS FUGACES */
/* ========================================= */

.shooting-star{
    position:absolute;
    width:2px;
    height:140px;
    background:linear-gradient(white,transparent);
    transform:rotate(45deg);
    opacity:0;
    animation:shoot 7s linear infinite;
}

@keyframes shoot{

    0%{
        opacity:0;
        top:-10%;
        left:110%;
    }

    10%{
        opacity:1;
    }

    30%{
        top:120%;
        left:-10%;
        opacity:0;
    }

    100%{
        opacity:0;
    }
}

/* ========================================= */
/* PANTALLA INICIAL */
/* ========================================= */

#welcome-screen{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:30px;
    z-index:10;
    transition:all 2s ease;
}

#welcome-screen.hide{
    opacity:0;
    transform:scale(1.5);
    filter:blur(20px);
    pointer-events:none;
}

.title{
    font-family:'Caveat',cursive;
    font-size:3rem;
    color:#ffd9ff;
    margin-bottom:20px;

    text-shadow:
    0 0 10px #ff8dfd,
    0 0 20px #ff8dfd;
}

.subtitle{
    max-width:700px;
    line-height:1.8;
    color:#f2dfff;
    margin-bottom:30px;
}

#counter{
    font-size:1.2rem;
    margin-bottom:30px;
    text-shadow:0 0 10px white;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:40px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:1rem;
    cursor:pointer;
    backdrop-filter:blur(10px);

    transition:0.4s;

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0 0 20px rgba(255,255,255,0.2);
}

button:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 20px #ffb3ff,
    0 0 50px #ff8dfd;
}

/* ========================================= */
/* GALAXIA */
/* ========================================= */

#galaxy{
    position:absolute;
    width:100%;
    height:100vh;
    opacity:0;
    transition:all 4s ease;
    overflow:hidden;
}

#galaxy.active{
    opacity:1;
}

/* ========================================= */
/* MUNDO */
/* ========================================= */

#world{
    position:absolute;
    width:5000px;
    height:5000px;
    left:-2500px;
    top:-2500px;
    transform-origin:center;
}

/* ========================================= */
/* NÚCLEO */
/* ========================================= */

.core{
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;

    background:
    radial-gradient(circle,
    #ffd6ff 0%,
    #ff8dfd 40%,
    #7b2fff 100%);

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    box-shadow:
    0 0 80px #ff8dfd,
    0 0 160px #7b2fff;

    animation:pulse 5s ease-in-out infinite;
}

@keyframes pulse{

    0%{
        transform:translate(-50%,-50%) scale(1);
    }

    50%{
        transform:translate(-50%,-50%) scale(1.05);
    }

    100%{
        transform:translate(-50%,-50%) scale(1);
    }
}

.core-text{
    font-family:'Caveat',cursive;
    font-size:2.8rem;
    padding:20px;
}

/* ========================================= */
/* RAZONES */
/* ========================================= */

.reason{
    position:absolute;
    color:white;
    white-space:nowrap;
    font-size:1rem;

    text-shadow:
    0 0 10px white;

    animation:float 6s ease-in-out infinite;

    opacity:0.9;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* ========================================= */
/* NEBULOSAS */
/* ========================================= */

.nebula{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.18;
}

</style>
</head>

<body>

<div id="universe">

    <div id="stars"></div>

    <!-- PANTALLA INICIAL -->

    <div id="welcome-screen">

        <div class="title">
            Hemos estado juntos durante...
        </div>

        <div id="counter"></div>

        <div class="subtitle">
            Y esto es lo que he aprendido y me enamora de ti ✨
        </div>

        <button onclick="enterGalaxy()">
            Mírate a través de mis ojos
        </button>

    </div>

    <!-- GALAXIA -->

    <div id="galaxy">

        <div id="world"></div>

    </div>

</div>

<script>

/* ========================================= */
/* CONTADOR */
/* ========================================= */

const startDate = new Date("December 8, 2024 00:00:00");

function updateCounter(){

    const now = new Date();

    const diff = now - startDate;

    const days = Math.floor(diff / (1000*60*60*24));

    const hours =
    Math.floor((diff/(1000*60*60)) % 24);

    const minutes =
    Math.floor((diff/(1000*60)) % 60);

    const seconds =
    Math.floor((diff/1000) % 60);

    document.getElementById("counter").innerHTML =
    `${days} días ${hours} horas ${minutes} minutos ${seconds} segundos`;
}

setInterval(updateCounter,1000);

/* ========================================= */
/* ESTRELLAS */
/* ========================================= */

const starsContainer =
document.getElementById("stars");

for(let i=0;i<300;i++){

    const star =
    document.createElement("div");

    star.classList.add("star");

    const size = Math.random()*3;

    star.style.width = size+"px";
    star.style.height = size+"px";

    star.style.left =
    Math.random()*100+"%";

    star.style.top =
    Math.random()*100+"%";

    star.style.animationDuration =
    (2 + Math.random()*5)+"s";

    starsContainer.appendChild(star);
}

/* ========================================= */
/* ESTRELLAS FUGACES */
/* ========================================= */

for(let i=0;i<5;i++){

    const shooting =
    document.createElement("div");

    shooting.classList.add("shooting-star");

    shooting.style.animationDelay =
    (Math.random()*15)+"s";

    starsContainer.appendChild(shooting);
}

/* ========================================= */
/* ENTRAR A GALAXIA */
/* ========================================= */

function enterGalaxy(){

    document
    .getElementById("welcome-screen")
    .classList.add("hide");

    document
    .getElementById("galaxy")
    .classList.add("active");
}

/* ========================================= */
/* MUNDO */
/* ========================================= */

const world =
document.getElementById("world");

/* ========================================= */
/* NEBULOSAS */
/* ========================================= */

for(let i=0;i<8;i++){

    const nebula =
    document.createElement("div");

    nebula.classList.add("nebula");

    const size =
    300 + Math.random()*500;

    nebula.style.width =
    size+"px";

    nebula.style.height =
    size+"px";

    nebula.style.left =
    (Math.random()*4000)+"px";

    nebula.style.top =
    (Math.random()*4000)+"px";

    nebula.style.background =
    `radial-gradient(circle,
    rgba(${150+Math.random()*100},
    ${50+Math.random()*80},
    ${200+Math.random()*55},0.8),
    transparent)`;

    world.appendChild(nebula);
}

/* ========================================= */
/* NÚCLEO */
/* ========================================= */

const core =
document.createElement("div");

core.classList.add("core");

core.style.left = "2500px";
core.style.top = "2500px";

core.innerHTML = `
<div class="core-text">
Porque eres tú
</div>
`;

world.appendChild(core);

/* ========================================= */
/* RAZONES */
/* ========================================= */

const reasons = [

"Tus ojos no saben mentirme",
"Tu corazón habla con fuerza",
"Esos pequeños destellos en tus ojitos",
"Ojitos verdes suaves y delicados",
"La manera en que sonríes pese al mundo",
"Tu necesidad de sentirme contigo",
"La magnitud del sentir de tu corazón",
"La manera en que me miras",
"Esa sonrisa tan amplia y hermosa",
"Cómo te esfuerzas cada día",
"Tu determinación por nuestro futuro",
"La manera en que eres vulnerable conmigo",
"Lo delicada que te ves descansando",
"La manera en que me dices que me amas",
"Cómo dices que eres mía",
"Cómo haces latir mi corazón",
"La emoción que sentimos al tocarnos",
"El valor que le das al significado",
"La manera particular en que ves el mundo",
"Cómo me arrullas en las madrugadas",
"Las maneras inusuales en que tocas mi corazón",
"Cómo me impulsas a tener más metas",
"Cómo me impulsas a ser mejor",
"La gran fe que te caracteriza",
"Tu devoción a Dios",
"Tus torpezas cuando te pones nerviosa",
"La forma en que hablas cuando te emocionas",
"Cómo abrazas mi alma",
"Cómo besas mi ser",
"Cómo haces cercana la distancia",
"Cómo tu voz atraviesa kilómetros",
"Cómo haces sentir hogar una pantalla",
"Cómo tus palabras saben abrazarme",
"Cómo existes dentro de mí incluso lejos",
"Cómo haces eterno el tiempo contigo",
"La manera en que tu ternura vence al mundo",
"Cómo haces sentir paz a mi corazón",
"Cómo haces que quiera vivir un futuro contigo",
"Cómo me haces sentir elegido",
"La delicadeza con la que cuidas mi corazón",
"Cómo tus silencios hablan bonito",
"Cómo haces que el amor se sienta eterno",
"Cómo tus ojos siempre regresan a mí",
"La forma en que iluminas mis madrugadas",
"Cómo haces que el universo tenga sentido",
"La paz que siento imaginándonos juntos",
"Cómo haces que mis sueños tengan dirección",
"La manera en que me haces sentir amado",
"Cómo conviertes pequeños momentos en eternidad",
"Porque simplemente eres tú"

];

/* ========================================= */
/* CREAR RAZONES */
/* ========================================= */

reasons.forEach((reason,index)=>{

    const text =
    document.createElement("div");

    text.classList.add("reason");

    text.innerText = reason;

    const angle =
    (index/reasons.length) *
    Math.PI * 2;

    const radius =
    500 + (index % 5) * 220;

    const x =
    Math.cos(angle) * radius;

    const y =
    Math.sin(angle) * radius;

    text.style.left =
    (2500 + x)+"px";

    text.style.top =
    (2500 + y)+"px";

    text.style.animationDelay =
    (Math.random()*5)+"s";

    world.appendChild(text);

});

/* ========================================= */
/* MOVIMIENTO */
/* ========================================= */

let scale = 1;

let currentX = -1900;
let currentY = -1900;

let isDragging = false;

let startX;
let startY;

function updateTransform(){

    world.style.transform =
    `translate(${currentX}px,
    ${currentY}px)
    scale(${scale})`;
}

updateTransform();

/* ========================================= */
/* MOUSE */
/* ========================================= */

window.addEventListener("mousedown",(e)=>{

    isDragging = true;

    startX = e.clientX-currentX;
    startY = e.clientY-currentY;

});

window.addEventListener("mousemove",(e)=>{

    if(!isDragging) return;

    currentX = e.clientX-startX;
    currentY = e.clientY-startY;

    updateTransform();

});

window.addEventListener("mouseup",()=>{

    isDragging = false;

});

/* ========================================= */
/* TOUCH */
/* ========================================= */

window.addEventListener("touchstart",(e)=>{

    if(e.touches.length === 1){

        isDragging = true;

        startX =
        e.touches[0].clientX-currentX;

        startY =
        e.touches[0].clientY-currentY;
    }

});

window.addEventListener("touchmove",(e)=>{

    if(e.touches.length === 1 && isDragging){

        currentX =
        e.touches[0].clientX-startX;

        currentY =
        e.touches[0].clientY-startY;

        updateTransform();
    }

});

window.addEventListener("touchend",()=>{

    isDragging = false;

});

/* ========================================= */
/* ZOOM */
/* ========================================= */

window.addEventListener("wheel",(e)=>{

    e.preventDefault();

    scale -= e.deltaY * 0.001;

    scale =
    Math.min(Math.max(0.5,scale),4);

    updateTransform();

},{ passive:false });

/* ========================================= */
/* PINCH ZOOM */
/* ========================================= */

let initialDistance = null;

window.addEventListener("touchmove",(e)=>{

    if(e.touches.length === 2){

        const dx =
        e.touches[0].clientX -
        e.touches[1].clientX;

        const dy =
        e.touches[0].clientY -
        e.touches[1].clientY;

        const distance =
        Math.sqrt(dx*dx + dy*dy);

        if(initialDistance){

            const delta =
            distance - initialDistance;

            scale += delta * 0.002;

            scale =
            Math.min(Math.max(0.5,scale),5);

            updateTransform();
        }

        initialDistance = distance;
    }

});

window.addEventListener("touchend",()=>{

    initialDistance = null;

});

</script>

</body>
</html>
