<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Porque eres tú ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:'Poppins',sans-serif;
    color:white;
}

/* ========================================= */
/* UNIVERSO */
/* ========================================= */

#universe{
    position:fixed;
    width:100%;
    height:100vh;
    overflow:hidden;

    background:
    radial-gradient(circle at center,
    #14001f 0%,
    #080012 40%,
    #000000 100%);
}

/* ========================================= */
/* ESTRELLAS */
/* ========================================= */

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:twinkle linear infinite;
}

@keyframes twinkle{

    0%{
        opacity:0.2;
        transform:scale(0.8);
    }

    50%{
        opacity:1;
        transform:scale(1.2);
    }

    100%{
        opacity:0.2;
        transform:scale(0.8);
    }
}

/* ========================================= */
/* ESTRELLAS FUGACES */
/* ========================================= */

.shooting-star{
    position:absolute;
    width:2px;
    height:120px;

    background:
    linear-gradient(white,transparent);

    transform:rotate(45deg);

    opacity:0;

    animation:shoot 8s linear infinite;
}

@keyframes shoot{

    0%{
        opacity:0;
        top:-10%;
        left:110%;
    }

    10%{
        opacity:1;
    }

    30%{
        top:120%;
        left:-10%;
        opacity:0;
    }

    100%{
        opacity:0;
    }
}

/* ========================================= */
/* PANTALLA INICIAL */
/* ========================================= */

#welcome-screen{

    position:absolute;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    text-align:center;

    padding:30px;

    z-index:10;

    transition:all 2s ease;
}

#welcome-screen.hide{

    opacity:0;

    transform:scale(1.5);

    filter:blur(20px);

    pointer-events:none;
}

.title{

    font-family:'Caveat',cursive;

    font-size:3rem;

    color:#ffdfff;

    margin-bottom:20px;

    text-shadow:
    0 0 10px #ff8dfd,
    0 0 20px #ff8dfd;
}

.subtitle{

    max-width:700px;

    line-height:1.8;

    color:#f3ddff;

    margin-bottom:30px;
}

#counter{

    font-size:1.2rem;

    margin-bottom:30px;

    text-shadow:0 0 10px white;
}

button{

    padding:15px 35px;

    border:none;

    border-radius:40px;

    background:rgba(255,255,255,0.08);

    color:white;

    cursor:pointer;

    font-size:1rem;

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.15);

    transition:0.4s;
}

button:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 20px #ff8dfd,
    0 0 50px #ff8dfd;
}

/* ========================================= */
/* GALAXIA */
/* ========================================= */

#galaxy{

    position:absolute;

    width:100%;
    height:100vh;

    overflow:hidden;

    opacity:0;

    transition:opacity 3s ease;
}

#galaxy.active{
    opacity:1;
}

/* ========================================= */
/* MUNDO */
/* ========================================= */

#world{

    position:absolute;

    width:5000px;
    height:5000px;

    left:0;
    top:0;

    transform-origin:center;
}

/* ========================================= */
/* NÚCLEO */
/* ========================================= */

.core{

    position:absolute;

    width:240px;
    height:240px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
    radial-gradient(circle,
    #ffdfff 0%,
    #ff8dfd 40%,
    #7d33ff 100%);

    box-shadow:
    0 0 80px #ff8dfd,
    0 0 160px #7d33ff;

    animation:pulse 5s ease-in-out infinite;
}

@keyframes pulse{

    0%{
        transform:translate(-50%,-50%) scale(1);
    }

    50%{
        transform:translate(-50%,-50%) scale(1.05);
    }

    100%{
        transform:translate(-50%,-50%) scale(1);
    }
}

.core-text{

    font-family:'Caveat',cursive;

    font-size:2.8rem;

    padding:20px;
}

/* ========================================= */
/* RAZONES */
/* ========================================= */

.reason{

    position:absolute;

    color:white;

    white-space:nowrap;

    font-size:1rem;

    text-shadow:
    0 0 10px white;

    animation:float 6s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* ========================================= */
/* NEBULOSAS */
/* ========================================= */

.nebula{

    position:absolute;

    border-radius:50%;

    filter:blur(120px);

    opacity:0.18;
}

</style>
</head>

<body>

<div id="universe">

    <div id="stars"></div>

    <!-- BIENVENIDA -->

    <div id="welcome-screen">

        <div class="title">
            Hemos estado juntos durante...
        </div>

        <div id="counter"></div>

        <div class="subtitle">
            Y esto es lo que he aprendido y me enamora de ti ✨
        </div>

        <button onclick="enterGalaxy()">
            Mírate a través de mis ojos
        </button>

    </div>

    <!-- GALAXIA -->

    <div id="galaxy">

        <div id="world"></div>

    </div>

</div>

<script>

/* ========================================= */
/* CONTADOR */
/* ========================================= */

const startDate =
new Date("December 8, 2024 00:00:00");

function updateCounter(){

    const now = new Date();

    const diff = now - startDate;

    const days =
    Math.floor(diff/(1000*60*60*24));

    const hours =
    Math.floor((diff/(1000*60*60))%24);

    const minutes =
    Math.floor((diff/(1000*60))%60);

    const seconds =
    Math.floor((diff/1000)%60);

    document.getElementById("counter").innerHTML =
    `${days} días ${hours} horas ${minutes} minutos ${seconds} segundos`;
}

setInterval(updateCounter,1000);

updateCounter();

/* ========================================= */
/* ESTRELLAS */
/* ========================================= */

const stars =
document.getElementById("stars");

for(let i=0;i<300;i++){

    const star =
    document.createElement("div");

    star.classList.add("star");

    const size =
    Math.random()*3;

    star.style.width =
    size+"px";

    star.style.height =
    size+"px";

    star.style.left =
    Math.random()*100+"%";

    star.style.top =
    Math.random()*100+"%";

    star.style.animationDuration =
    (2+Math.random()*5)+"s";

    stars.appendChild(star);
}

/* ========================================= */
/* ESTRELLAS FUGACES */
/* ========================================= */

for(let i=0;i<5;i++){

    const shooting =
    document.createElement("div");

    shooting.classList.add("shooting-star");

    shooting.style.animationDelay =
    (Math.random()*10)+"s";

    stars.appendChild(shooting);
}

/* ========================================= */
/* ENTRAR */
/* ========================================= */

function enterGalaxy(){

    document
    .getElementById("welcome-screen")
    .classList.add("hide");

    document
    .getElementById("galaxy")
    .classList.add("active");
}

/* ========================================= */
/* MUNDO */
/* ========================================= */

const world =
document.getElementById("world");

/* ========================================= */
/* NEBULOSAS */
/* ========================================= */

for(let i=0;i<8;i++){

    const nebula =
    document.createElement("div");

    nebula.classList.add("nebula");

    const size =
    300 + Math.random()*500;

    nebula.style.width =
    size+"px";

    nebula.style.height =
    size+"px";

    nebula.style.left =
    (Math.random()*4500)+"px";

    nebula.style.top =
    (Math.random()*4500)+"px";

    nebula.style.background =
    `radial-gradient(circle,
    rgba(${150+Math.random()*100},
    ${50+Math.random()*80},
    ${200+Math.random()*50},0.8),
    transparent)`;

    world.appendChild(nebula);
}

/* ========================================= */
/* NÚCLEO */
/* ========================================= */

const core =
document.createElement("div");

core.classList.add("core");

core.style.left = "2500px";
core.style.top = "2500px";

core.innerHTML = `
<div class="core-text">
Porque eres tú
</div>
`;

world.appendChild(core);

/* ========================================= */
/* RAZONES */
/* ========================================= */

const reasons = [

"Tus ojos no saben mentirme",
"Tu corazón habla con fuerza",
"Cómo abrazas mi alma",
"Cómo besas mi ser",
"Tu gran fe",
"Tu manera de amar",
"Cómo haces cercana la distancia",
"Tu sonrisa tan hermosa",
"Cómo me haces sentir hogar",
"Cómo tu voz calma mi mundo",
"Tu ternura infinita",
"Cómo existes dentro de mí",
"Tu forma de ver el mundo",
"Cómo me haces sentir elegido",
"Cómo me impulsas a ser mejor",
"Tu manera de cuidarme",
"Cómo haces eterno el tiempo contigo",
"Tu delicadeza",
"Tu sensibilidad",
"Cómo iluminas mis madrugadas"

];

reasons.forEach((reason,index)=>{

    const text =
    document.createElement("div");

    text.classList.add("reason");

    text.innerText = reason;

    const angle =
    (index/reasons.length) *
    Math.PI * 2;

    const radius =
    450 + (index%4)*180;

    const x =
    Math.cos(angle)*radius;

    const y =
    Math.sin(angle)*radius;

    text.style.left =
    (2500+x)+"px";

    text.style.top =
    (2500+y)+"px";

    world.appendChild(text);
});

/* ========================================= */
/* CÁMARA */
/* ========================================= */

let scale = 1;

let currentX =
window.innerWidth/2 - 2500;

let currentY =
window.innerHeight/2 - 2500;

let isDragging = false;

let startX;
let startY;

function updateTransform(){

    world.style.transform =
    `translate(${currentX}px,
    ${currentY}px)
    scale(${scale})`;
}

updateTransform();

/* ========================================= */
/* MOUSE */
/* ========================================= */

window.addEventListener("mousedown",(e)=>{

    isDragging = true;

    startX =
    e.clientX-currentX;

    startY =
    e.clientY-currentY;
});

window.addEventListener("mousemove",(e)=>{

    if(!isDragging) return;

    currentX =
    e.clientX-startX;

    currentY =
    e.clientY-startY;

    updateTransform();
});

window.addEventListener("mouseup",()=>{

    isDragging = false;
});

/* ========================================= */
/* TOUCH */
/* ========================================= */

window.addEventListener("touchstart",(e)=>{

    if(e.touches.length===1){

        isDragging = true;

        startX =
        e.touches[0].clientX-currentX;

        startY =
        e.touches[0].clientY-currentY;
    }
});

window.addEventListener("touchmove",(e)=>{

    if(e.touches.length===1 && isDragging){

        currentX =
        e.touches[0].clientX-startX;

        currentY =
        e.touches[0].clientY-startY;

        updateTransform();
    }
});

window.addEventListener("touchend",()=>{

    isDragging = false;
});

/* ========================================= */
/* ZOOM */
/* ========================================= */

window.addEventListener("wheel",(e)=>{

    e.preventDefault();

    scale -= e.deltaY*0.001;

    scale =
    Math.min(Math.max(0.5,scale),4);

    updateTransform();

},{passive:false});

/* ========================================= */
/* PINCH ZOOM */
/* ========================================= */

let initialDistance = null;

window.addEventListener("touchmove",(e)=>{

    if(e.touches.length===2){

        const dx =
        e.touches[0].clientX -
        e.touches[1].clientX;

        const dy =
        e.touches[0].clientY -
        e.touches[1].clientY;

        const distance =
        Math.sqrt(dx*dx + dy*dy);

        if(initialDistance){

            const delta =
            distance-initialDistance;

            scale += delta*0.002;

            scale =
            Math.min(Math.max(0.5,scale),5);

            updateTransform();
        }

        initialDistance = distance;
    }
});

window.addEventListener("touchend",()=>{

    initialDistance = null;
});

</script>

</body>
</html>
